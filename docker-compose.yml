# Explicit project name so a dev checkout never collides with a deployment
# folder also named "portfolio" on the same Docker host.
name: portfolio-dev

services:
  web:
    build: .
    image: ghcr.io/jjwren/portfolio:latest
    ports:
      - "${WEB_PORT:-8080}:8080"
    env_file: .env
    environment:
      ConnectionStrings__Default: "Host=db;Database=${POSTGRES_DB:-portfolio};Username=${POSTGRES_USER:-portfolio};Password=${POSTGRES_PASSWORD}"
      DataProtection__KeysPath: /app/keys
    volumes:
      - uploads:/app/uploads
      - dpkeys:/app/keys
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  dpkeys:
